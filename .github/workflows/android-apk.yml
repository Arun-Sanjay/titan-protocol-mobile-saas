name: Android APK

# Mirrors Classic's mobile/.github/workflows/android.yml — builds a debug-
# signed APK directly on the GitHub runner with Gradle and uploads it as
# a workflow artifact. No EAS account, no EXPO_TOKEN secret, no signing
# keystore required for first-run preview installs.
#
# Triggers:
#   - push to master: checks → APK build → artifact upload
#   - PR to master: checks only (the slow APK build is skipped)
#   - workflow_dispatch: manual trigger from the Actions tab

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: TypeScript + Jest gate ─────────────────────────────────────────
  checks:
    name: Type-check & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # SDK 55 worklets has a peer-dep conflict with expo-modules-core
      # on modern npm; --legacy-peer-deps is the documented workaround.
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript
        run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Jest tests
        run: npx jest --passWithNoTests

  # ─── Job 2: Build Android debug APK ────────────────────────────────────────
  # Skipped on PRs (save CI minutes). Outputs an artifact downloadable from
  # the run's summary page → Artifacts → titan-protocol-mobile-saas-*.apk
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name != 'pull_request'
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Provision .env. Prefer secrets if set; fall back to .env.example
      # because the Supabase URL + anon key are publishable (RLS-gated).
      - name: Provision .env
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            {
              echo "EXPO_PUBLIC_SUPABASE_URL=${SUPABASE_URL}"
              echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            } > .env
            echo "✓ .env built from CI secrets"
          elif [ -f .env.example ]; then
            cp .env.example .env
            echo "✓ .env copied from .env.example (publishable values)"
          else
            echo "⚠ No .env.example and no secrets — build will likely fail at runtime"
          fi

      # mobile-saas doesn't commit android/ to git (managed Expo project);
      # `expo prebuild` generates a fresh native android/ folder from app.json.
      # --no-install: deps are already installed above with --legacy-peer-deps.
      # --non-interactive: never prompt; CI must not hang.
      - name: Expo prebuild (generates android/ folder)
        run: npx expo prebuild --platform android --no-install --non-interactive

      # Monotonically-increasing versionCode tied to GH's run_number.
      # Future store-bound builds need this to climb, so it might as well
      # climb on every preview build too.
      - name: Compute versionCode
        id: vc
        run: echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # assembleDebug uses the debug.keystore that ships with the Android
      # SDK (consistent fingerprint across all RN dev installs) so the
      # APK installs cleanly on real devices without any keystore setup.
      # If we ever want production-style optimization (Hermes bytecode +
      # minify), swap to assembleRelease + Classic's keystore-inject step.
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Set version string
        id: version
        run: echo "tag=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Locate the APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$APK_PATH" | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "✓ APK at $APK_PATH ($(du -h "$APK_PATH" | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: titan-protocol-mobile-saas-${{ steps.version.outputs.tag }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          {
            echo "## Android Preview APK ready"
            echo ""
            echo "**Version code:** ${{ steps.vc.outputs.code }}"
            echo "**Tag:** ${{ steps.version.outputs.tag }}"
            echo "**Size:** ${{ steps.apk.outputs.size }}"
            echo ""
            echo "**Download:** scroll up to the **Artifacts** section of this run summary →"
            echo "\`titan-protocol-mobile-saas-${{ steps.version.outputs.tag }}\` → unzip → install on phone."
            echo ""
            echo "_Debug-signed; installs as a new app alongside other Titan builds._"
          } >> "$GITHUB_STEP_SUMMARY"
