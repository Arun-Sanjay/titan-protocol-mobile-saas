name: EAS Build · Android Preview

# Triggers:
#   - On every push to master → builds a preview APK + leaves the download
#     link in the workflow log.
#   - workflow_dispatch → click "Run workflow" in the Actions tab to rebuild
#     without pushing (handy for re-running after a secret update).
#
# Required secret: EXPO_TOKEN
#   Generate at https://expo.dev/accounts/[username]/settings/access-tokens
#   Add via:  Repo → Settings → Secrets and variables → Actions → New secret

on:
  push:
    branches: [master]
  workflow_dispatch:

# Cancel in-flight builds on rapid re-pushes — EAS builds queue otherwise.
concurrency:
  group: eas-build-android-preview
  cancel-in-progress: true

jobs:
  build:
    name: Android preview APK (EAS cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build Android preview APK
        # --non-interactive  →  no prompts (CI must not hang)
        # --wait             →  block until EAS reports done; final URL lands in log
        # --profile preview  →  uses the APK output config from eas.json
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait
